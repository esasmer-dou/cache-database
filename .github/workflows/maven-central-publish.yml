name: Maven Central Publish

on:
  workflow_dispatch:
    inputs:
      gaRelease:
        description: Run production GA preflight before publishing
        required: true
        default: "false"
      releaseTag:
        description: Stable GA tag to verify when gaRelease is true; defaults to the workflow ref name
        required: false
        default: ""
      targetRef:
        description: Branch or ref that must have green production evidence when gaRelease is true
        required: false
        default: main
      migrationCoverageCsvPath:
        description: Committed CSV path for full production route coverage
        required: false
        default: docs/ga-migration-coverage.csv

permissions:
  actions: read
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Java and Central credentials
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Block GA publish unless readiness gates are green
        if: ${{ inputs.gaRelease == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          STAGING_REDIS_URI: ${{ secrets.STAGING_REDIS_URI }}
          STAGING_POSTGRES_URL: ${{ secrets.STAGING_POSTGRES_URL }}
          STAGING_POSTGRES_USER: ${{ secrets.STAGING_POSTGRES_USER }}
          STAGING_POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          STAGING_MSSQL_URL: ${{ secrets.STAGING_MSSQL_URL }}
          STAGING_MSSQL_USER: ${{ secrets.STAGING_MSSQL_USER }}
          STAGING_MSSQL_PASSWORD: ${{ secrets.STAGING_MSSQL_PASSWORD }}
        run: |
          $releaseTag = "${{ inputs.releaseTag }}"
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            $releaseTag = "${{ github.ref_name }}"
          }
          $targetRef = "${{ inputs.targetRef }}"
          if ([string]::IsNullOrWhiteSpace($targetRef)) {
            $targetRef = "main"
          }
          ./tools/ci/check-ga-release-readiness.ps1 `
            -Repository "${{ github.repository }}" `
            -TargetRef $targetRef `
            -ReleaseTag $releaseTag `
            -CoverageCsvPath "${{ inputs.migrationCoverageCsvPath }}" `
            -SummaryPath ./target/ga-release-readiness-summary.md `
            -SkipMavenCentralPublishCheck

      - name: Publish GA preflight summary
        if: ${{ always() && inputs.gaRelease == 'true' }}
        shell: pwsh
        run: |
          if (Test-Path ./target/ga-release-readiness-summary.md) {
            Get-Content ./target/ga-release-readiness-summary.md >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload GA preflight summary
        if: ${{ always() && inputs.gaRelease == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ga-release-preflight
          path: target/ga-release-readiness-summary.md
          if-no-files-found: warn
          retention-days: 30

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish signed artifacts to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: >
          mvn -B -P oss-release
          -DskipTests
          -Dgpg.skip=false
          -Dgpg.passphrase="${GPG_PASSPHRASE}"
          deploy
