name: Public Beta Readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/public-beta-readiness.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "docs/**"
      - "tr/docs/**"
      - "README.md"
      - "tr/README.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "SUPPORT.md"
      - "CHANGELOG.md"
      - "PRODUCTION_GA_CRITERIA.md"
      - "cachedb-core/**"
      - "cachedb-annotations/**"
      - "cachedb-processor/**"
      - "cachedb-storage-redis/**"
      - "cachedb-storage-jdbc/**"
      - "cachedb-storage-postgres/**"
      - "cachedb-storage-mssql/**"
      - "cachedb-starter/**"
      - "cachedb-spring-boot-starter/**"
      - "cachedb-examples/**"
      - "pom.xml"
      - "tools/ci/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/public-beta-readiness.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "docs/**"
      - "tr/docs/**"
      - "README.md"
      - "tr/README.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "SUPPORT.md"
      - "CHANGELOG.md"
      - "PRODUCTION_GA_CRITERIA.md"
      - "cachedb-core/**"
      - "cachedb-annotations/**"
      - "cachedb-processor/**"
      - "cachedb-storage-redis/**"
      - "cachedb-storage-jdbc/**"
      - "cachedb-storage-postgres/**"
      - "cachedb-storage-mssql/**"
      - "cachedb-starter/**"
      - "cachedb-spring-boot-starter/**"
      - "cachedb-examples/**"
      - "pom.xml"
      - "tools/ci/**"

jobs:
  public-beta-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate community and release metadata
        shell: pwsh
        run: ./tools/ci/validate-public-beta-readiness.ps1 -SummaryPath ./target/public-beta-readiness-summary.md

      - name: Validate Turkish docs quality
        shell: pwsh
        run: ./tools/ci/check-tr-docs.ps1 -SummaryPath ./target/tr-docs-quality-summary.md

      - name: Verify OSS release packaging
        shell: pwsh
        run: mvn -B -P oss-release -DskipTests "-Dgpg.skip=true" package

      - name: Check public API compatibility
        shell: pwsh
        run: ./tools/ci/check-public-api-compatibility.ps1

      - name: Publish readiness summary
        shell: pwsh
        run: |
          Get-Content ./target/public-beta-readiness-summary.md >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          Get-Content ./target/tr-docs-quality-summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload readiness artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-beta-readiness
          path: |
            target/public-beta-readiness-summary.md
            target/tr-docs-quality-summary.md
          if-no-files-found: error
          retention-days: 14
