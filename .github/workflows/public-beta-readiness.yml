name: Public Beta Readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/public-beta-readiness.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "docs/**"
      - "tr/docs/**"
      - "README.md"
      - "tr/README.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "SUPPORT.md"
      - "CHANGELOG.md"
      - "pom.xml"
      - "tools/ci/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/public-beta-readiness.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "docs/**"
      - "tr/docs/**"
      - "README.md"
      - "tr/README.md"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "SUPPORT.md"
      - "CHANGELOG.md"
      - "pom.xml"
      - "tools/ci/**"

jobs:
  public-beta-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate community and release metadata
        shell: pwsh
        run: ./tools/ci/validate-public-beta-readiness.ps1 -SummaryPath ./target/public-beta-readiness-summary.md

      - name: Verify OSS release packaging
        run: mvn -B -P oss-release -DskipTests -Dgpg.skip=true package

      - name: Publish readiness summary
        shell: pwsh
        run: Get-Content ./target/public-beta-readiness-summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-beta-readiness
          path: |
            target/public-beta-readiness-summary.md
          if-no-files-found: error
          retention-days: 14
