name: Production Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/production-evidence.yml"
      - "cachedb-core/**"
      - "cachedb-annotations/**"
      - "cachedb-processor/**"
      - "cachedb-storage-redis/**"
      - "cachedb-storage-jdbc/**"
      - "cachedb-storage-postgres/**"
      - "cachedb-storage-mssql/**"
      - "cachedb-starter/**"
      - "cachedb-spring-boot-starter/**"
      - "cachedb-examples/**"
      - "cachedb-production-tests/**"
      - "tools/ci/**"
      - "tools/ops/cluster/**"
      - "docs/**"
      - "tr/docs/**"
      - "pom.xml"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/production-evidence.yml"
      - "cachedb-core/**"
      - "cachedb-annotations/**"
      - "cachedb-processor/**"
      - "cachedb-storage-redis/**"
      - "cachedb-storage-jdbc/**"
      - "cachedb-storage-postgres/**"
      - "cachedb-storage-mssql/**"
      - "cachedb-starter/**"
      - "cachedb-spring-boot-starter/**"
      - "cachedb-examples/**"
      - "cachedb-production-tests/**"
      - "tools/ci/**"
      - "tools/ops/cluster/**"
      - "docs/**"
      - "tr/docs/**"
      - "pom.xml"

jobs:
  production-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7.2
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgresql
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run production smoke and benchmark evidence
        shell: pwsh
        run: ./tools/ci/run-production-evidence.ps1 -MavenExecutable mvn -RedisUri redis://127.0.0.1:56379 -PostgresUrl jdbc:postgresql://127.0.0.1:55432/postgres

      - name: Build evidence summary
        shell: pwsh
        run: ./tools/ci/write-production-evidence-summary.ps1 -OutputPath ./target/cachedb-prodtest-reports/production-evidence-summary.md

      - name: Publish workflow summary
        shell: pwsh
        run: Get-Content ./target/cachedb-prodtest-reports/production-evidence-summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload production evidence artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: production-evidence
          path: |
            target/cachedb-prodtest-reports/**
            cachedb-production-tests/target/cachedb-prodtest-reports/**
            cachedb-production-tests/target/surefire-reports/**
          if-no-files-found: error
          retention-days: 14

  coordination-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7.2
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgresql
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run multi-instance coordination smoke
        shell: pwsh
        run: ./tools/ci/run-multi-instance-coordination-evidence.ps1 -MavenExecutable mvn -RedisUri redis://127.0.0.1:56379

      - name: Publish coordination summary
        shell: pwsh
        run: Get-Content ./target/cachedb-prodtest-reports/multi-instance-coordination-smoke.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload coordination evidence artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coordination-evidence
          path: |
            target/cachedb-prodtest-reports/multi-instance-coordination-smoke.*
            cachedb-production-tests/target/surefire-reports/**
            cachedb-spring-boot-starter/target/surefire-reports/**
          if-no-files-found: error
          retention-days: 14

  redis-failover-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      redis:
        image: redis:7.2
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgresql
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Redis outage and recovery evidence
        shell: pwsh
        run: ./tools/ci/run-redis-failover-evidence.ps1 -MavenExecutable mvn -RedisUri redis://127.0.0.1:56379

      - name: Publish Redis failover summary
        shell: pwsh
        run: Get-Content ./target/cachedb-redis-failover-reports/redis-failover-evidence.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Redis failover evidence artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: redis-failover-evidence
          path: |
            target/cachedb-redis-failover-reports/**
            cachedb-production-tests/target/surefire-reports/**
          if-no-files-found: error
          retention-days: 14

  production-scenario-certification:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7.2
        ports:
          - 56379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgresql
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run production scenario certification
        shell: pwsh
        run: ./tools/ci/run-production-scenario-certification.ps1 -MavenExecutable mvn -RedisUri redis://127.0.0.1:56379

      - name: Publish scenario certification summary
        shell: pwsh
        run: Get-Content ./target/cachedb-prodtest-reports/production-scenario-certification.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload scenario certification evidence artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: production-scenario-certification
          path: |
            target/cachedb-prodtest-reports/production-scenario-certification.*
            cachedb-production-tests/target/surefire-reports/**
          if-no-files-found: error
          retention-days: 14

  mssql-provider-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
        ports:
          - 14333:1433

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run MSSQL provider evidence
        shell: pwsh
        run: ./tools/ci/run-mssql-provider-evidence.ps1 -MavenExecutable mvn -MssqlUrl 'jdbc:sqlserver://127.0.0.1:14333;databaseName=tempdb;encrypt=false;trustServerCertificate=true' -MssqlUser sa -MssqlPassword 'YourStrong!Passw0rd' -RestartSqlServerContainer

      - name: Publish MSSQL provider summary
        shell: pwsh
        run: Get-Content ./target/cachedb-mssql-provider-reports/mssql-provider-evidence.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload MSSQL provider evidence artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mssql-provider-evidence
          path: |
            target/cachedb-mssql-provider-reports/**
            cachedb-storage-mssql/target/surefire-reports/**
            cachedb-starter/target/surefire-reports/**
            cachedb-integration-tests/target/surefire-reports/**
          if-no-files-found: error
          retention-days: 14

  mssql-listener-failover-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run local MSSQL listener failover evidence
        shell: pwsh
        run: ./tools/ci/run-local-mssql-listener-failover-evidence.ps1 -MavenExecutable mvn -SkipProviderEvidence

      - name: Publish MSSQL listener failover summary
        shell: pwsh
        run: Get-Content ./target/cachedb-local-mssql-listener-failover-reports/local-mssql-listener-failover-evidence.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload MSSQL listener failover evidence artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mssql-listener-failover-evidence
          path: |
            target/cachedb-local-mssql-listener-failover-reports/**
            cachedb-storage-mssql/target/surefire-reports/**
            cachedb-starter/target/surefire-reports/**
            cachedb-integration-tests/target/surefire-reports/**
          if-no-files-found: error
          retention-days: 14
