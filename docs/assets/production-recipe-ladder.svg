<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Production recipe ladder</title>
  <desc id="desc">Recommended progression from generated module to bindings to direct repositories.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7f1"/>
      <stop offset="100%" stop-color="#efe9dd"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#184e77"/>
      <stop offset="100%" stop-color="#2d74aa"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6f4a"/>
      <stop offset="100%" stop-color="#30a067"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8c4c16"/>
      <stop offset="100%" stop-color="#cd7523"/>
    </linearGradient>
  </defs>
  <rect width="920" height="420" rx="24" fill="url(#bg2)"/>
  <text x="40" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#14253a">Production recipe ladder</text>
  <text x="40" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4a5a6b">Start high-level, move lower only when profiling proves it matters</text>
  <g transform="translate(40,120)">
    <rect x="0" y="0" width="260" height="180" rx="20" fill="url(#step1)"/>
    <text x="24" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">1. GeneratedCacheModule</text>
    <text x="24" y="68" font-family="Consolas, Segoe UI Mono, monospace" font-size="14" fill="#dfefff">using(session)...</text>
    <text x="24" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Default for normal service teams</text>
    <text x="24" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Best DX / overhead balance</text>
    <text x="24" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Start here unless profiling says otherwise</text>

    <rect x="300" y="0" width="260" height="180" rx="20" fill="url(#step2)"/>
    <text x="324" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2. *CacheBinding</text>
    <text x="324" y="68" font-family="Consolas, Segoe UI Mono, monospace" font-size="14" fill="#e4fff0">using(session)...</text>
    <text x="324" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">For explicit hot endpoints</text>
    <text x="324" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Less wrapper surface, still generated</text>
    <text x="324" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Good middle ground for measured hotspots</text>

    <rect x="600" y="0" width="260" height="180" rx="20" fill="url(#step3)"/>
    <text x="624" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">3. Direct repository</text>
    <text x="624" y="68" font-family="Consolas, Segoe UI Mono, monospace" font-size="14" fill="#fff0df">EntityRepository / ProjectionRepository</text>
    <text x="624" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">For proven hotspots, workers, replay</text>
    <text x="624" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Smallest abstraction surface</text>
    <text x="624" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#ffffff">Use only when lower really matters</text>
  </g>
  <path d="M300 210 C325 210, 335 210, 360 210" stroke="#728198" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M560 210 C585 210, 595 210, 620 210" stroke="#728198" stroke-width="4" fill="none" stroke-linecap="round"/>
  <polygon points="360,210 348,202 348,218" fill="#728198"/>
  <polygon points="620,210 608,202 608,218" fill="#728198"/>
  <text x="40" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6a7785">Rule of thumb: stay as high as you can, go lower only with measured evidence.</text>
</svg>
