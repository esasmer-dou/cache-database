<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Repository recipe benchmark</title>
  <desc id="desc">Measured API-surface overhead for generated binding, JPA-style domain module, and minimal repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="100%" stop-color="#f4efe5"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#113c68"/>
      <stop offset="100%" stop-color="#1f5f9b"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#177245"/>
      <stop offset="100%" stop-color="#2aa55f"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a4a13"/>
      <stop offset="100%" stop-color="#d46d1c"/>
    </linearGradient>
  </defs>
  <rect width="920" height="420" rx="24" fill="url(#bg)"/>
  <text x="40" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#14253a">Measured API-surface overhead</text>
  <text x="40" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4a5a6b">Same repository path, same operations, different CacheDB consumption surfaces</text>
  <g transform="translate(40,120)">
    <text x="0" y="-10" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6a7785">Average latency (ns)</text>
    <line x1="0" y1="210" x2="760" y2="210" stroke="#c8d1db" stroke-width="1.5"/>
    <line x1="0" y1="145" x2="760" y2="145" stroke="#dde4eb" stroke-width="1"/>
    <line x1="0" y1="80" x2="760" y2="80" stroke="#dde4eb" stroke-width="1"/>
    <line x1="0" y1="15" x2="760" y2="15" stroke="#dde4eb" stroke-width="1"/>
    <text x="770" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6a7785">0</text>
    <text x="770" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6a7785">5000</text>
    <text x="770" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6a7785">10000</text>
    <text x="770" y="19" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6a7785">15000</text>
    <g transform="translate(0,0)">
      <rect x="0" y="36" width="303" height="42" rx="12" fill="url(#barB)"/>
      <text x="16" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Generated entity binding</text>
      <text x="320" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#177245">6005 ns</text>
      <text x="0" y="102" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#546273">Fastest average in the current local snapshot</text>
    </g>
    <g transform="translate(0,110)">
      <rect x="0" y="36" width="406" height="42" rx="12" fill="url(#barC)"/>
      <text x="16" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">JPA-style domain module</text>
      <text x="423" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#9a4a13">8059 ns</text>
      <text x="0" y="102" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#546273">Grouped ergonomic surface with modest wrapper cost</text>
    </g>
    <g transform="translate(0,220)">
      <rect x="0" y="18" width="760" height="42" rx="12" fill="url(#barA)"/>
      <text x="16" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Minimal repository</text>
      <text x="777" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#113c68">15075 ns</text>
      <text x="0" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#546273">Lowest p95 in the current local snapshot</text>
    </g>
  </g>
  <text x="40" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6a7785">Source: target/cachedb-prodtest-reports/repository-recipe-comparison.md</text>
</svg>
